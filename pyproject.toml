# pyproject.toml

[tool.ruff]
line-length = 120
target-version = "py310"
preview = true

[tool.ruff.lint]
select = [
    "E",   # pycodestyle 기본 규칙
    "F",   # pyflakes (미사용 변수 등)
    "I",   # isort (import 정렬)
    "N",   # 네이밍 규칙
]
ignore = [
    "E501", # Line too long (줄 길이 초과는 지식 그래프/프롬프트 특성상 허용)
    "N999", # Invalid module name (camelCase 파일명 허용)
    "E402", # Module level import not at top of file (스크립트 중간 임포트 허용)
    "E722", # Do not use bare except (크롤러의 포괄적 except 허용)
]

# 절대 import만 허용 (상대 import 금지)
[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"

# vulture로 사용하지 않는 코드 확인
[tool.vulture]
min_confidence = 80
paths = ["src/"]
ignore_names = ["test_*", "setUp", "tearDown"]

[tool.pytest.ini_options]
pythonpath = [
  "."
]