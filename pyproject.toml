# pyproject.toml

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle 기본 규칙
    "F",   # pyflakes (미사용 변수 등)
    "I",   # isort (import 정렬)
    "N",   # 네이밍 규칙
]
ignore = []

# 절대 import만 허용 (상대 import 금지)
[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"

# vulture로 사용하지 않는 코드 확인
[tool.vulture]
min_confidence = 80
paths = ["src/"]
ignore_names = ["test_*", "setUp", "tearDown"]